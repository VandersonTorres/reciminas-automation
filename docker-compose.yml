version: "3.9"

services:
  web:
    build: .
    container_name: django_app
    ports:
      - "8000:8000"
    env_file:
      - server/.env
    volumes:
      - ./downloads:/app/server/downloads
      - ./data:/app/server/data
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - server/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
