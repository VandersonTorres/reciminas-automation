{% extends "core/base.html" %}

{% block title %}NF de Entrada - Reciminas{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0">📥 NF de Entrada</h4>
        </div>
        <div class="card-body">
            <p class="text-muted">Preencha os dados abaixo para emitir uma nova Nota Fiscal de Entrada.</p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="text-end">
                    <button type="submit" class="btn btn-success">💾 Emitir</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary">↩ Voltar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
